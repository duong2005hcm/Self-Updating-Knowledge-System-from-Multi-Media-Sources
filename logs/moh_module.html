function getCookie(name) {
    var nameEQ = name + "=";
    var ca = document.cookie.split(';');
    for(var i=0;i < ca.length;i++) {
        var c = ca[i];
        while (c.charAt(0)==' ') c = c.substring(1,c.length);
        if (c.indexOf(nameEQ) == 0) return c.substring(nameEQ.length,c.length);
    }
    return null;
}
var checkCookie = getCookie('ngon_ngu_session');
if (checkCookie === 'TIENG_ANH') {
	ngon_ngu_session = 'en';
} else {
	ngon_ngu_session = 'vn';
}
</script>

<script type="text/javascript">
function printFunc(htmlString) {
	 var divToPrint = document.getElementById('content-category');
     var htmlToPrint = '' +
         '<style>' +
         'table th, table td {' +
         'border:0 solid #000;' +
         'padding;0.5em;' +
         '}' +
         '</style>';
     htmlToPrint += divToPrint.outerHTML;
    var newIframe = document.createElement('iframe');
    newIframe.width = '1px';
    newIframe.height = '1px';
    newIframe.src = 'about:blank';

    // for IE wait for the IFrame to load so we can access contentWindow.document.body
    newIframe.onload = function() {
        var script_tag = newIframe.contentWindow.document.createElement("script");
        script_tag.type = "text/javascript";
        var script = newIframe.contentWindow.document.createTextNode('function Print(){ window.focus(); window.print(); }');
        script_tag.appendChild(script);

        newIframe.contentWindow.document.body.innerHTML = htmlToPrint;
        newIframe.contentWindow.document.body.appendChild(script_tag);

        // for chrome, a timeout for loading large amounts of content
        setTimeout(function() {
            newIframe.contentWindow.Print();
            newIframe.contentWindow.document.body.removeChild(script_tag);
            newIframe.parentElement.removeChild(newIframe);
        }, 200);
    };
    document.body.appendChild(newIframe);
}
</script>
