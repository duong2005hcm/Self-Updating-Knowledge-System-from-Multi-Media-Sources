<script>
	function getCookie(name) {
		var nameEQ = name + "=";
		var ca = document.cookie.split(';');
		for (var i = 0; i < ca.length; i++) {
			var c = ca[i];
			while (c.charAt(0) == ' ')
				c = c.substring(1, c.length);
			if (c.indexOf(nameEQ) == 0)
				return c.substring(nameEQ.length, c.length);
		}
		return null;
	}
	var checkCookie = getCookie('ngon_ngu_session');
	if (checkCookie === 'TIENG_ANH') {
		ngon_ngu_session = 'en';
	} else {
		ngon_ngu_session = 'vn';
	}
</script>

<script>
  function toggleColorPicker() {
    const picker = document.getElementById("colorPickerMenu");
    if (picker.style.display === "none" || picker.style.display === "") {
      picker.style.display = "block";
    } else {
      picker.style.display = "none";
    }
  }

  function changeTextColor(color) {
    const article = document.getElementById("detail-news");
    if (article) {
    	article.querySelectorAll("*").forEach(el => el.style.color = color);
    }
    document.getElementById("colorPickerMenu").style.display = "none";
  }

  // Tự động đóng menu nếu click ra ngoài
  window.addEventListener("click", function(event) {
    const picker = document.getElementById("colorPickerMenu");
    if (picker && !picker.contains(event.target) && !event.target.classList.contains("fa-paint-brush")) {
      picker.style.display = "none";
    }
  });
</script>
<script>
  let isSpeaking = false;
  let utterance;

  function toggleReadAloud() {
    const content = document.getElementById("detail-news");
    if (!content) return;

    if (!isSpeaking) {
      const text = content.innerText || content.textContent;
      utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = "vi-VN"; // Tiếng Việt
      speechSynthesis.speak(utterance);
      isSpeaking = true;

      // Khi đọc xong
      utterance.onend = function () {
        isSpeaking = false;
      };
    } else {
      speechSynthesis.cancel(); // Dừng đọc
      isSpeaking = false;
    }
  }
</script>
